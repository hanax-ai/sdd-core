<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="960" height="560" fill="#ffffff"/>

  <!-- Root GLOBAL tier -->
  <rect x="80" y="24" width="800" height="96" rx="10" fill="#1f3a5f"/>
  <text x="480" y="54" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="600">Root GLOBAL governance</text>
  <text x="480" y="78" text-anchor="middle" fill="#c9d7ea" font-size="13">constitution (.specify/memory) · mirror registry (knowledge/instructions.md) · tooling declaration</text>
  <text x="480" y="98" text-anchor="middle" fill="#c9d7ea" font-size="13">conversations/ · wip/ (Gate 1 / Gate 2) · docs/proposals/</text>

  <!-- arrows from root to projects -->
  <line x1="300" y1="120" x2="300" y2="168" stroke="#5a6b80" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="120" x2="660" y2="168" stroke="#5a6b80" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="480" y="150" text-anchor="middle" fill="#5a6b80" font-size="12" font-style="italic">inherits · read-only from projects (Article III)</text>

  <!-- governance-framework -->
  <rect x="80" y="170" width="380" height="170" rx="10" fill="#eef3fa" stroke="#2e5e9e" stroke-width="2"/>
  <text x="270" y="200" text-anchor="middle" fill="#1f3a5f" font-size="17" font-weight="600">governance-framework</text>
  <text x="270" y="220" text-anchor="middle" fill="#2e5e9e" font-size="12.5" font-style="italic">the what &amp; why — stable, deliberate</text>
  <text x="270" y="248" text-anchor="middle" fill="#33415c" font-size="12.5">principles · policies · standards · control</text>
  <text x="270" y="266" text-anchor="middle" fill="#33415c" font-size="12.5">objectives · decision-rights/RACI models</text>
  <text x="270" y="284" text-anchor="middle" fill="#33415c" font-size="12.5">maturity models · methodology</text>
  <text x="270" y="312" text-anchor="middle" fill="#2e5e9e" font-size="12" font-weight="600">framework-definition specs (docs/specs/)</text>

  <!-- governance-ops -->
  <rect x="500" y="170" width="380" height="170" rx="10" fill="#f2f7f0" stroke="#3e7a3e" stroke-width="2"/>
  <text x="690" y="200" text-anchor="middle" fill="#24421f" font-size="17" font-weight="600">governance-ops</text>
  <text x="690" y="220" text-anchor="middle" fill="#3e7a3e" font-size="12.5" font-style="italic">the how &amp; when — living, high-churn</text>
  <text x="690" y="248" text-anchor="middle" fill="#33415c" font-size="12.5">runbooks · cadences · checklists · intake</text>
  <text x="690" y="266" text-anchor="middle" fill="#33415c" font-size="12.5">workflows · dashboards · control-execution</text>
  <text x="690" y="284" text-anchor="middle" fill="#33415c" font-size="12.5">evidence (classed; real evidence never default-committed)</text>
  <text x="690" y="312" text-anchor="middle" fill="#3e7a3e" font-size="12" font-weight="600">operational-capability specs (docs/specs/)</text>

  <!-- one-way dependency arrow -->
  <line x1="460" y1="255" x2="500" y2="255" stroke="#8a5a1f" stroke-width="2.5" marker-end="url(#arrowBrown)"/>
  <text x="480" y="238" text-anchor="middle" fill="#8a5a1f" font-size="11.5" font-weight="600">released standards</text>
  <text x="480" y="360" text-anchor="middle" fill="#8a5a1f" font-size="11.5">one-way: ops consumes read-only, versioned traceability</text>

  <!-- arrows to lifecycle -->
  <line x1="270" y1="340" x2="270" y2="408" stroke="#5a6b80" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="340" x2="690" y2="408" stroke="#5a6b80" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="480" y="392" text-anchor="middle" fill="#5a6b80" font-size="12" font-style="italic">per-project feature lifecycle — spec-first (root Article V)</text>

  <!-- lifecycle strip -->
  <rect x="80" y="410" width="800" height="106" rx="10" fill="#f6f7f9" stroke="#9aa5b1" stroke-width="1.5"/>
  <g font-size="13" fill="#33415c" text-anchor="middle">
    <rect x="104" y="434" width="132" height="56" rx="7" fill="#ffffff" stroke="#2e5e9e" stroke-width="1.5"/>
    <text x="170" y="458" font-weight="600">1. Scaffold</text>
    <text x="170" y="476" font-size="11.5">copy template/</text>

    <rect x="264" y="434" width="132" height="56" rx="7" fill="#ffffff" stroke="#2e5e9e" stroke-width="1.5"/>
    <text x="330" y="458" font-weight="600">2. Specify + Clarify</text>
    <text x="330" y="476" font-size="11.5">spec.md</text>

    <rect x="424" y="434" width="112" height="56" rx="7" fill="#ffffff" stroke="#2e5e9e" stroke-width="1.5"/>
    <text x="480" y="458" font-weight="600">3. Plan</text>
    <text x="480" y="476" font-size="11.5">plan.md</text>

    <rect x="564" y="434" width="112" height="56" rx="7" fill="#ffffff" stroke="#2e5e9e" stroke-width="1.5"/>
    <text x="620" y="458" font-weight="600">4. Tasks</text>
    <text x="620" y="476" font-size="11.5">tasks.md</text>

    <rect x="704" y="434" width="132" height="56" rx="7" fill="#ffffff" stroke="#2e5e9e" stroke-width="1.5"/>
    <text x="770" y="458" font-weight="600">5. Execute</text>
    <text x="770" y="476" font-size="11.5">in order, docs stay truth</text>
  </g>
  <line x1="236" y1="462" x2="264" y2="462" stroke="#5a6b80" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="396" y1="462" x2="424" y2="462" stroke="#5a6b80" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="536" y1="462" x2="564" y2="462" stroke="#5a6b80" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="676" y1="462" x2="704" y2="462" stroke="#5a6b80" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a6b80"/>
    </marker>
    <marker id="arrowBrown" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#8a5a1f"/>
    </marker>
  </defs>
</svg>
